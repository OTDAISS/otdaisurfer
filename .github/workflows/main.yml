name: Generate Lockfile
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: npm install
      - uses: actions/upload-artifact@v3
        with:
          name: lockfile
          path: package-lock.json
